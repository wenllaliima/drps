<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>DRPS — Teste de UI</title>
<style>
body{font-family:sans-serif;background:#09101f;color:#e8eef8;padding:40px;max-width:600px;margin:0 auto}
.inst-btn{display:block;width:100%;padding:12px;margin:6px 0;border-radius:8px;border:2px solid #1e2d45;background:#111827;cursor:pointer;text-align:left;color:#e8eef8}
.inst-btn.sel{border-color:#00d4aa;background:rgba(0,212,170,.1)}
.inst-btn span{pointer-events:none;display:block}
.inst-btn .name{font-size:13px;font-weight:700}
.inst-btn .desc{font-size:11px;color:#6b7fa3;margin-top:2px}
.drop{border:2px dashed #1e2d45;border-radius:12px;padding:24px;text-align:center;position:relative;background:#1a2438;cursor:pointer;margin:12px 0}
.drop input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop:hover{border-color:#00d4aa}
#status{margin-top:20px;padding:12px;background:#1a2438;border-radius:8px;font-size:12px;min-height:40px;border:1px solid #1e2d45}
</style>
</head>
<body>
<h2 style="color:#00d4aa;margin-bottom:20px">Teste de Seleção de Instrumento + Upload</h2>

<div id="inst-grid">
  <button class="inst-btn sel" onclick="selectInst('aot',this)">
    <span class="name">AOT — Avaliação da Org. do Trabalho</span>
    <span class="desc">24 questões · AMBRAC/DRPS</span>
  </button>
  <button class="inst-btn" onclick="selectInst('copsoq2s',this)">
    <span class="name">COPSOQ II — Versão Curta</span>
    <span class="desc">40 questões · Escala 1–5</span>
  </button>
  <button class="inst-btn" onclick="selectInst('copsoq2m',this)">
    <span class="name">COPSOQ II — Versão Média</span>
    <span class="desc">72 questões · Escala 1–5</span>
  </button>
  <button class="inst-btn" onclick="selectInst('copsoq3',this)">
    <span class="name">COPSOQ III — Brasil</span>
    <span class="desc">79 itens · 7 fatores</span>
  </button>
</div>

<div class="drop" id="drop">
  <input type="file" id="fi" accept=".xlsx,.xls">
  <div style="font-size:28px" id="icon">📊</div>
  <p id="p1"><strong>Clique</strong> ou arraste a planilha (.xlsx/.xls)</p>
  <p id="p2" style="font-size:11px;color:#6b7fa3;margin-top:4px">Exportada do Google Forms</p>
</div>

<div id="status">Selecione um instrumento e faça upload de uma planilha para testar.</div>

<script>
let INST = 'aot';

function selectInst(id, el){
  INST = id;
  const btn = el.closest ? el.closest('.inst-btn') : el;
  document.querySelectorAll('.inst-btn').forEach(b => b.classList.remove('sel'));
  if(btn) btn.classList.add('sel');
  document.getElementById('status').textContent = '✅ Instrumento selecionado: ' + id;
}

const drop = document.getElementById('drop');
const fi = document.getElementById('fi');

drop.addEventListener('dragover', e => { e.preventDefault(); drop.style.borderColor='#00d4aa'; });
drop.addEventListener('dragleave', () => { drop.style.borderColor='#1e2d45'; });
drop.addEventListener('drop', e => {
  e.preventDefault();
  drop.style.borderColor = '#1e2d45';
  if(e.dataTransfer.files[0]) acceptFile(e.dataTransfer.files[0]);
});
fi.addEventListener('change', e => { if(e.target.files[0]) acceptFile(e.target.files[0]); });

function acceptFile(f){
  document.getElementById('icon').textContent = '✅';
  document.getElementById('p1').innerHTML = '<strong>' + f.name + '</strong>';
  document.getElementById('p2').textContent = (f.size/1024).toFixed(0) + ' KB · pronto';
  document.getElementById('status').textContent = '✅ Arquivo carregado: ' + f.name + ' — Instrumento: ' + INST;
}
</script>
</body>
</html>
